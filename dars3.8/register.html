<!DOCTYPE html>
<html>

<head>
    <title>Register Page</title>
</head>

<body style="font-family: Arial; margin:40px;">

    <h1>Register</h1>

    <form onsubmit="register(event)">

        <div style="margin-bottom:10px;">
            <label>Full Name</label><br>
            <input id="fullName" style="padding:8px;width:250px;">
        </div>

        <div style="margin-bottom:10px;">
            <label>Email</label><br>
            <input id="email" type="email" style="padding:8px;width:250px;">
        </div>

        <div style="margin-bottom:10px;">
            <label>Password</label><br>
            <input id="password" type="password" style="padding:8px;width:250px;">
        </div>

        <button type="submit" style="padding:10px 20px;">
            Register
        </button>

    </form>

    <div style="margin-top: 5px;">
        <a href="login.html">Agar accaunting bo'lsa</a>
    </div>

    <h3 id="message"></h3>

    <script src="register.js"></script>

</body>

</html>
